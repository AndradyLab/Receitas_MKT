name: receitas_mkt
description: Aplicativo de gerenciamento de fluxo de caixa para marketing.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.2
  pdf: ^3.10.6
  printing: ^5.11.1
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  gsheets: ^0.4.0
  connectivity_plus: ^6.0.1
  uuid: ^4.3.3
  intl: ^0.19.0
  dio: ^5.4.0
  equatable: ^2.0.5
  path: ^1.8.3
  flutter_svg: ^2.0.9
  go_router: ^17.2.3
  logging: ^1.3.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9
  analyzer: ^7.6.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/